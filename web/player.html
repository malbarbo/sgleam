<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sgleam Player</title>
    <style>
        body {
            margin: 0;
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        #display {
            outline: none;
        }

        #display svg {
            display: block;
        }

        #status {
            color: #888;
            font-family: monospace;
            font-size: 14px;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }

        #error {
            color: #e06c75;
            font-family: monospace;
            font-size: 14px;
            padding: 1em;
            white-space: pre-wrap;
            max-width: 80%;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }
    </style>
</head>

<body>
    <div id="status">Loading...</div>
    <div id="error" style="display:none"></div>
    <div id="display" tabindex="0"></div>
    <script type="module" src="player.js"></script>
</body>

</html>
