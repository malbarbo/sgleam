name: ci

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  lint:
    name: Lint & Format (Linux)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: stable
          components: rustfmt, clippy

      - name: Check formatting
        run: cargo fmt -- --check

      - name: Run Clippy
        run: cargo clippy -- -D warnings

      - name: Setup Deno
        uses: denoland/setup-deno@v1
        with:
          deno-version: "2.x"

      - name: Check TypeScript formatting
        run: deno fmt --check

      - name: Check TypeScript types
        run: deno check web/ui.ts web/worker.ts web/channel_test.ts web/ansi_test.ts web/test.ts

  wasm:
    name: Test wasm
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: stable
          target: wasm32-wasip1

      - name: Setup Deno
        uses: denoland/setup-deno@v1
        with:
          deno-version: "2.x"

      - name: Build
        run: cargo build -p sgleam-wasm --target wasm32-wasip1 --release

      - name: Bundle
        run: |
          mkdir -p dist
          cp target/wasm32-wasip1/release/sgleam.wasm dist/
          deno bundle web/worker.ts -o dist/worker.js
          deno bundle web/test.ts -o dist/test.js

      - name: Test
        run: |
          deno test --allow-read web/channel_test.ts
          deno test web/ansi_test.ts
          deno test --allow-read dist/test.js

  test:
    name: Test (${{ matrix.os }} / ${{ matrix.target }})
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        include:
          - os: ubuntu-24.04
            target: x86_64-unknown-linux-musl
            setup: sudo apt-get install musl-tools

          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-musl
            setup: sudo apt-get install musl-tools

          - os: windows-2022
            target: x86_64-pc-windows-msvc
            setup: git config --global core.longpaths true

          - os: macos-15-intel
            target: x86_64-apple-darwin
            setup: ""

          - os: macos-15
            target: aarch64-apple-darwin
            setup: ""

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: stable
          target: ${{ matrix.target }}

      - name: Setup
        if: matrix.setup != ''
        run: ${{ matrix.setup }}

      - name: Run tests
        run: cargo test --target ${{ matrix.target }}
